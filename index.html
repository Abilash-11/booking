<!DOCTYPE html>
<html>

<head>

<title>Coffee Booking</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
width:350px;
background:white;
padding:25px;
margin:auto;
margin-top:100px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,button{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:black;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>☕ Coffee Slot Booking</h2>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone Number">

<select id="slot">

<option>10AM - 11AM</option>
<option>11AM - 12PM</option>
<option>12PM - 1PM</option>
<option>1PM - 2PM</option>

</select>

<button onclick="pay()">Pay ₹9 & Book</button>

</div>

<script>

function pay(){

var name=document.getElementById("name").value
var phone=document.getElementById("phone").value
var slot=document.getElementById("slot").value

var options = {

"key": "RAZORPAY_KEY_ID",

"amount": 900,

"currency": "INR",

"name": "Coffee Shop",

"description": "Coffee Slot Booking",

handler: function (response){

var payment=response.razorpay_payment_id

fetch("YOUR_SCRIPT_URL",{

method:"POST",

body:JSON.stringify({

name:name,
phone:phone,
slot:slot,
payment:payment

})

})

.then(res=>res.text())

.then(data=>{

var msg="☕ Coffee Booking Confirmed %0AName:"+name+"%0ASlot:"+slot

window.open("https://wa.me/"+phone+"?text="+msg)

window.open("https://wa.me/919500297336?text="+msg)

alert("Booking Confirmed")

})

}

};

var rzp=new Razorpay(options)

rzp.open()

}

</script>

</body>

</html>
